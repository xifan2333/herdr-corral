name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Leave empty to use the current ref."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Version
        id: version
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            ref="${{ github.event.inputs.tag }}"
          else
            ref="${GITHUB_REF_NAME}"
          fi
          ver="${ref#v}"
          echo "tag=${ref}" >> "$GITHUB_OUTPUT"
          echo "version=${ver}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          set -euo pipefail
          ver="${{ steps.version.outputs.version }}"
          arch="${{ matrix.arch }}"
          target="${{ matrix.target }}"
          name="herdr-corral-${ver}-${arch}"
          dest="dist/${name}"
          mkdir -p "${dest}/bin" "${dest}/share/herdr-corral/scripts"

          install -Dm755 "target/${target}/release/corral" "${dest}/bin/corral"
          install -Dm755 "target/${target}/release/corral-diff" "${dest}/bin/corral-diff"
          install -Dm755 "target/${target}/release/corral-github" "${dest}/bin/corral-github"
          install -Dm644 config.default.sh "${dest}/share/herdr-corral/config.default.sh"
          install -Dm644 herdr-plugin.toml "${dest}/share/herdr-corral/herdr-plugin.toml"
          install -Dm755 scripts/open-corral.sh "${dest}/share/herdr-corral/scripts/open-corral.sh"
          install -Dm644 README.md "${dest}/share/herdr-corral/README.md"
          install -Dm755 scripts/install-release.sh "${dest}/install.sh"

          tar -C dist -cJf "dist/${name}.tar.xz" "${name}"
          (cd dist && sha256sum "${name}.tar.xz" > "${name}.tar.xz.sha256")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: herdr-corral-${{ steps.version.outputs.version }}-${{ matrix.arch }}
          path: |
            dist/*.tar.xz
            dist/*.sha256

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Version
        id: version
        run: |
          set -euo pipefail
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            ref="${{ github.event.inputs.tag }}"
          else
            ref="${GITHUB_REF_NAME}"
          fi
          echo "tag=${ref}" >> "$GITHUB_OUTPUT"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: herdr-corral ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.xz
            dist/*.sha256
          body: |
            ## herdr-corral ${{ steps.version.outputs.version }}

            Prebuilt Linux binaries for the Corral Herdr plugin.

            ### Assets
            - `herdr-corral-${{ steps.version.outputs.version }}-x86_64.tar.xz`
            - `herdr-corral-${{ steps.version.outputs.version }}-aarch64.tar.xz`

            ### Install (manual)
            ```bash
            tar -xJf herdr-corral-${{ steps.version.outputs.version }}-x86_64.tar.xz
            cd herdr-corral-${{ steps.version.outputs.version }}-x86_64
            ./install.sh
            ```
            `install.sh` installs into `~/.local` when `~/.local/bin` is on `PATH`, otherwise `/usr` (needs root).

            ### Arch Linux (AUR)
            ```bash
            yay -S herdr-corral-bin
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
