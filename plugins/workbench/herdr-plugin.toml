id = "workbench.vscode"
name = "VS Code Workbench"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "VS Code-style activity bar: Explorer (yazi), SCM (lazygit), GitHub (issues / PRs / Actions)"
platforms = ["linux", "macos"]

# --- Explorer ---------------------------------------------------------------
[[panes]]
id = "explorer"
title = "Explorer"
placement = "split"
command = ["bash", "-c", "exec bash \"$HERDR_PLUGIN_ROOT/scripts/run-explorer.sh\""]

[[actions]]
id = "toggle-explorer"
title = "Toggle Explorer"
description = "Open / focus / close the file explorer pane (yazi)."
contexts = ["workspace"]
command = ["bash", "scripts/toggle-pane.sh", "explorer", "Explorer"]

# --- SCM --------------------------------------------------------------------
[[panes]]
id = "scm"
title = "Source Control"
placement = "split"
command = ["bash", "-c", "exec bash \"$HERDR_PLUGIN_ROOT/scripts/run-scm.sh\""]

[[actions]]
id = "toggle-scm"
title = "Toggle Source Control"
description = "Open / focus / close the SCM pane (lazygit)."
contexts = ["workspace"]
command = ["bash", "scripts/toggle-pane.sh", "scm", "Source Control"]

# --- GitHub -----------------------------------------------------------------
[[panes]]
id = "github"
title = "GitHub"
placement = "split"
command = ["bash", "-c", "exec bash \"$HERDR_PLUGIN_ROOT/scripts/run-github.sh\""]

[[actions]]
id = "toggle-github"
title = "Toggle GitHub"
description = "Open / focus / close the GitHub hub (issues / PRs / Actions)."
contexts = ["workspace"]
command = ["bash", "scripts/toggle-pane.sh", "github", "GitHub"]

# Convenience: open a specific GitHub section directly
[[actions]]
id = "github-issues"
title = "GitHub Issues"
description = "Open the GitHub hub focused on Issues."
contexts = ["workspace"]
command = ["bash", "scripts/open-github-section.sh", "issues"]

[[actions]]
id = "github-prs"
title = "GitHub Pull Requests"
description = "Open the GitHub hub focused on Pull Requests."
contexts = ["workspace"]
command = ["bash", "scripts/open-github-section.sh", "prs"]

[[actions]]
id = "github-actions"
title = "GitHub Actions"
description = "Open the GitHub hub focused on Actions / workflow runs."
contexts = ["workspace"]
command = ["bash", "scripts/open-github-section.sh", "actions"]

# Ctrl-click a GitHub issue/PR URL → open detail in a side pane
[[actions]]
id = "preview-link"
title = "Preview GitHub link"
command = ["bash", "scripts/open-link-preview.sh"]

[[panes]]
id = "link-preview"
title = "GitHub Preview"
placement = "split"
command = ["bash", "-c", "exec bash \"$HERDR_PLUGIN_ROOT/scripts/run-link-preview.sh\""]

[[link_handlers]]
id = "github-issue-or-pr"
title = "Preview GitHub issue or PR"
pattern = "^https://github\\.com/[^/]+/[^/]+/(issues|pull)/[0-9]+/?$"
action = "preview-link"
