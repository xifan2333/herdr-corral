id = "workbench.starter"
name = "Workbench Starter"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Minimal starter plugin from herdr-workbench"
platforms = ["linux", "macos", "windows"]

[[actions]]
id = "hello"
title = "Hello from starter"
contexts = ["workspace"]
command = ["bash", "scripts/hello.sh"]

[[actions]]
id = "list-workspaces"
title = "List workspaces"
contexts = ["workspace"]
command = ["bash", "scripts/list-workspaces.sh"]

[[actions]]
id = "dump-context"
title = "Dump plugin context"
contexts = ["workspace"]
command = ["bash", "scripts/dump-context.sh"]
