id = "corral"
name = "Corral"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "VS Code-style left sidebar: Explorer / SCM / GitHub for Herdr"
platforms = ["linux"]

# Binaries: /usr/bin (AUR) or $PATH.
# Plugin tree (manifest + scripts): herdr plugin install xifan2333/herdr-corral.
# User config: ~/.config/corral/config.sh

[[panes]]
id = "sidebar"
title = "Sidebar"
placement = "split"
command = ["corral"]

[[actions]]
id = "open"
title = "Open Corral sidebar"
description = "Open the Corral sidebar docked on the left (Explorer / SCM / GitHub)."
contexts = ["workspace"]
command = ["bash", "scripts/open-corral.sh"]
