id = "corral"
name = "Corral"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "VS Code-style left sidebar: Explorer / SCM / GitHub for Herdr"
platforms = ["linux"]

# seed ~/.config/corral/config.sh from config.default.sh on install/upgrade
[[startup]]
command = ["bash", "scripts/seed-config.sh"]

[[panes]]
id = "sidebar"
title = "Sidebar"
placement = "split"
command = ["corral"]

[[actions]]
id = "open"
title = "Open Corral sidebar"
description = "Open the Corral sidebar docked on the left (Explorer / SCM / GitHub)."
contexts = ["workspace"]
command = ["bash", "scripts/open-corral.sh"]
