id = "corral"
name = "Corral"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "VS Code-style left sidebar: Explorer / SCM / GitHub for Herdr"
platforms = ["linux", "macos"]

# GitHub `plugin install` builds the binary. Local `plugin link` does not —
# run `cargo build --release` yourself while developing.
[[build]]
command = ["cargo", "build", "--release"]

# Left-docked sidebar pane. Feature switching is in-process; file, diff, and
# GitHub previews reuse one owner-scoped nvim pane managed by config.sh.
[[panes]]
id = "sidebar"
title = "Sidebar"
placement = "split"
command = ["./target/release/corral"]

# Dock / open the sidebar on the left of the focused tab.
[[actions]]
id = "open"
title = "Open Corral sidebar"
description = "Open the Corral sidebar docked on the left (Explorer / SCM / GitHub)."
contexts = ["workspace"]
command = ["bash", "scripts/open-corral.sh"]
